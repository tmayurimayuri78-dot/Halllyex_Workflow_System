<!DOCTYPE html>
<html>

<head>
<title>Workflow Execution</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Execute Workflow</h1>

<div class="input-box">

<label>Select Workflow</label>
<select id="workflowId"></select>

<label>Amount</label>
<input id="amount" placeholder="Enter amount">

<button onclick="runWorkflow()">Run Workflow</button>

</div>

<br>

<div class="result-card">

<h3>Execution Result</h3>

<pre id="result">Waiting for execution...</pre>

</div>

<br>

<div class="nav-buttons">

<button onclick="goHome()">Home</button>

<button onclick="goWorkflows()">Workflows</button>

<button onclick="goLogs()">Logs</button>

</div>

</div>

<script src="script.js"></script>

<script>

async function runWorkflow(){

const workflowId = document.getElementById("workflowId").value
const amount = document.getElementById("amount").value

const res = await fetch(`http://127.0.0.1:8000/execute/${workflowId}`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({amount:Number(amount)})
})

const data = await res.json()

document.getElementById("result").textContent =
`Current Step: ${data.current_step}
Rule Applied: ${data.rule_applied}
Next Step: ${data.next_step}`
document.querySelector(".result-card").classList.add("success")

document.getElementById("amount").value=""

}

window.onload=function(){
loadWorkflowDropdown()
}

function goHome(){
window.location.href="index.html"
}

function goWorkflows(){
window.location.href="workflows.html"
}

function goLogs(){
window.location.href="logs.html"
}

</script>

</body>

</html>
